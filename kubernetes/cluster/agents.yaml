apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kagent
  namespace: flux-system
spec:
  interval: 5m
  retryInterval: 2m
  timeout: 5m
  dependsOn:
    - name: kagent-resources
    - name: mcp
  sourceRef:
    kind: ExternalArtifact
    name: agents
  path: ./agents
  prune: true
  wait: true