---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kagent
  namespace: kagent
spec:
  type: oci
  interval: 5m
  url: oci://ghcr.io/kagent-dev/kagent/helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent-crd
  namespace: kagent
spec:
  targetNamespace: kagent
  interval: 5m
  releaseName: kagent-crds
  install:
    createNamespace: true
  chart:
    spec:
      chart: kagent-crds
      version: "0.7"
      sourceRef:
        kind: HelmRepository
        name: kagent
        namespace: kagent
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: kagent
spec:
  targetNamespace: kagent
  interval: 5m
  dependsOn:
    - name: kagent-crd
  releaseName: kagent
  install:
    createNamespace: true
  chart:
    spec:
      chart: kagent
      version: "0.7"
      sourceRef:
        kind: HelmRepository
        name: kagent
        namespace: kagent
  values:
    agents:
      k8s-agent:
        enabled: false
      kgateway-agent:
        enabled: false
      istio-agent:
        enabled: false
      promql-agent:
        enabled: false
      observability-agent:
        enabled: false
      argo-rollouts-agent:
        enabled: false
      helm-agent:
        enabled: false
      cilium-policy-agent:
        enabled: false
      cilium-manager-agent:
        enabled: false
      cilium-debug-agent:
        enabled: false
    providers:
      openAI:
        apiKeySecretRef: openai-api-key
        apiKeySecretKey: apiKey

