---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kgateway
  namespace: kgateway
spec:
  type: oci
  interval: 5m
  url: oci://cr.agentgateway.dev/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kgateway-crd
  namespace: kgateway
spec:
  targetNamespace: kgateway
  interval: 5m
  releaseName: kgateway-crds
  install:
    createNamespace: true
  chart:
    spec:
      chart: kgateway-crds
      version: "2.2.2"
      sourceRef:
        kind: HelmRepository
        name: kgateway
        namespace: kgateway
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kgateway
  namespace: kgateway
spec:
  targetNamespace: kgateway
  interval: 5m
  dependsOn:
    - name: kgateway-crd
  releaseName: kgateway
  install:
    createNamespace: true
  chart:
    spec:
      chart: kgateway
      version: "2.2.2"
      sourceRef:
        kind: HelmRepository
        name: kgateway
        namespace: kagent


