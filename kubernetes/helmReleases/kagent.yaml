---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kagent
  namespace: flux-system
spec:
  type: oci
  interval: 5m
  url: oci://ghcr.io/kagent-dev/kagent/helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent-crd
  namespace: flux-system
spec:
  targetNamespace: kagent
  interval: 5m
  releaseName: kagent-crds
  install:
    createNamespace: true
  chart:
    spec:
      chart: kagent-crds
      version: "0.7"
      sourceRef:
        kind: HelmRepository
        name: kagent
        namespace: flux-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: flux-system
spec:
  targetNamespace: kagent
  interval: 5m
  dependsOn:
    - name: kagent-crd
  releaseName: kagent
  install:
    createNamespace: true
  chart:
    spec:
      chart: kagent
      version: "0.7"
      sourceRef:
        kind: HelmRepository
        name: kagent
        namespace: flux-system
  values:
    agents:
      k8s-agent:
        enabled: false
      kgateway-agent:
        enabled: false
      istio-agent:
        enabled: false
      promql-agent:
        enabled: false
      observability-agent:
        enabled: false
      argo-rollouts-agent:
        enabled: false
      helm-agent:
        enabled: false
      cilium-policy-agent:
        enabled: false
      cilium-manager-agent:
        enabled: false
      cilium-debug-agent:
        enabled: false
    providers:
      default: openAI
      providers:
        openAI:
          apiKeySecretRef: openai-api-key
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: openai-api-key
  namespace: kagent
spec:
  encryptedData:
    apiKey: 
  template:
    metadata:
      name: openai-api-key
      namespace: kagent
