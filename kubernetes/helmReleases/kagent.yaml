---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kagent
  namespace: flux-system
spec:
  interval: 1h
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: kagent
spec:
  targetNamespace: kagent
  interval: 10m
  releaseName: kagent
  chart:
    spec:
      chart: kagent
      version: "6.*"
      sourceRef:
        kind: HelmRepository
        name: kagent
        namespace: flux-system
  values:
    providers:
      default: openAI
      providers:
        openAI:
          apiKey: 