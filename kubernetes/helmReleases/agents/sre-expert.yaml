apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: sre-expert
  namespace: kagent
spec:
  type: Declarative
  declarative:
    modelConfig: agentgateway-gpt4-mini
    tools:
      - type: McpServer
        mcpServer:
          name: kagent-tool-server
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          toolNames:
          - k8s_check_service_connectivity
          - k8s_patch_resource
          - k8s_remove_annotation
          - k8s_annotate_resource
          - k8s_remove_label
          - k8s_label_resource
          - k8s_create_resource
          - k8s_create_resource_from_url
          - k8s_get_events
          - k8s_get_available_api_resources
          - k8s_get_cluster_configuration
          - k8s_describe_resource
          - k8s_delete_resource
          - k8s_get_resource_yaml
          - k8s_execute_command
          - k8s_apply_manifest
          - k8s_get_resources
          - k8s_get_pod_logs
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: kagent-builtin-prompts
          alias: builtin
    systemMessage: |
      You are a Kubernetes agent named sre expert.

      {{include "builtin/safety-guardrails"}}
      {{include "builtin/tool-usage-best-practices"}}

      Your tools: {{.ToolNames}}
